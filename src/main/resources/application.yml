#
# application.yml — главный конфигурационный файл Spring Boot.

#Что нужно сделать:
#  - Указать настройки подключения к базе данных.
#  - Указать порт приложения.
#  - Настроить параметры безопасности и JWT.
#  - Включить Swagger UI.

jwt:
  secret: ${JWT_SECRET}
  access-ttl: ${JWT_ACCESS_TTL}
  refresh-ttl: ${JWT_REFRESH_TTL}

#encryption:
#  salt: ${}
#  secret: ${}

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_system_db?currentSchema=public
    username: ${ALL_PRIVILEGES_USER_LOGIN}
    password: ${ALL_PRIVILEGES_USER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    database: postgresql
  liquibase:
    enabled: true

